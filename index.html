<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QueueLess AI - Smart Event Assistant</title>
    <meta name="description" content="QueueLess AI is a smart assistant for improving the physical event experience at large stadiums by recommending least crowded gates, washrooms, and food stalls.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header>
        <div class="logo">
            <h1>QueueLess AI</h1>
            <p>Your Smart Stadium Assistant</p>
        </div>
    </header>

    <main class="container">
        <!-- Assistant Section -->
        <section class="assistant-section">
            <h2>Chat Assistant</h2>
            <div class="chat-window" id="chat-window">
                <div class="message ai-message">
                    👋 Hi! I'm QueueLess AI. Ask me about the best entry gates, food options, or nearest washrooms!
                </div>
            </div>
            <div class="input-area">
                <input type="text" id="user-input" aria-label="Ask a question" placeholder="e.g., Which gate is least crowded?" autocomplete="off" />
                <button id="send-btn" aria-label="Send message">Send</button>
            </div>
        </section>

        <!-- Crowd Dashboard Section -->
        <section class="dashboard-section">
            <h2>Live Crowd Dashboard</h2>
            <div class="dashboard-grid" id="crowd-dashboard">
                <!-- Dashboard items will be injected here via JS -->
            </div>
        </section>

        <!-- Map Section -->
        <section class="map-section">
            <h2>Live Venue Map (Google Maps)</h2>
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d14686.792196328659!2d72.58552140643797!3d23.08832321458993!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e83ec6e2d8ab3%3A0xc3afbf64e9a03289!2sNarendra%20Modi%20Stadium!5e0!3m2!1sen!2sin!4v1713175822361!5m2!1sen!2sin" width="100%" height="400" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade" title="Narendra Modi Stadium Google Map"></iframe>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
